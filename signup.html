<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Makutano Hostel Management System</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="sign-up-page">

  <header class="header">
    <div class="header-logo">Makutano Hostel Management System</div>
  </header>

  <main class="login-sections">
    <div class="signin-card">
      <h1>Create Account</h1>
      <p class="subtitle">Sign up to get started</p>

      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Username" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Email Address" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required />
        </div>

        <button type="submit" class="btn-primary">Sign Up</button>

        <p id="signup-error" class="error-message" style="display:none;"></p>
      </form>

      <p class="signup-link">
        Already have an account?
        <span onclick="window.location.href='signin.html'"> Login</span>
      </p>
    </div>
  </main>

  <footer class="footer-container">
    <div class="footer-content">
      <div class="examerproinc-all-rights-res-parent">
        <div class="examerproinc-all-rights">© 2026 Makutano Hostel Management System™,Inc. All Rights Reserved</div>
        <div class="footer-links">
          <div class="privacy-policy">Privacy Policy</div>
          <div class="terms-conditions">Terms & Conditions</div>
          <div class="contact-us">Contact us</div>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/auth.js"></script>
</body>
</html>
