<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Makutano Hostel Management System</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <header class="header">
    <div class="header-logo">Makutano Hostel Management System</div>
  </header>

  <div class="signin-container">
    <div class="signin-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to continue</p>

      <form id="signinForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Email Address" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Password" required />
        </div>

        <button type="submit" class="btn-primary">Sign In</button>

        <p id="signin-error" class="error-message" style="display:none;"></p>
      </form>

      <p class="signup-link">
        Don't have an account?
        <span onclick="window.location.href='signup.html'"> Sign Up</span>
      </p>

      <p class="signup-link" style="margin-top: 0.5rem;">
        <span onclick="window.location.href='signin.html?role=admin'" style="font-size: 0.85rem; opacity: 0.8;">
          Staff / Admin Login
        </span>
      </p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
